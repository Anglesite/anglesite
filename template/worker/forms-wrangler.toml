# Forms handler worker — deployed via /anglesite:forms
# Generalizes the contact-form pattern to arbitrary user-defined forms.
# Secrets are set via: npx wrangler secret put <NAME>
#   TURNSTILE_SECRET_KEY
#   SITE_DOMAIN
#   INBOX_SECRET   (optional — required to fetch the Keystatic inbox)

name = "forms-handler"
main = "forms-worker.js"
compatibility_date = "2024-09-23"

# Cloudflare D1 — submissions inbox (ADR-0019). The /anglesite:inbox skill
# creates the database and rewrites database_id below. Without it the
# worker still delivers email; D1 writes are best-effort.
# [[d1_databases]]
# binding = "INBOX_DB"
# database_name = "form_submissions"
# database_id = "REPLACE_WITH_D1_DATABASE_ID"
