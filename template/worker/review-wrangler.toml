# Review form worker — deployed via /anglesite:testimonials
# Receives customer review submissions for moderation and display.
#
# Secrets are set via: npx wrangler secret put <NAME> --config worker/review-wrangler.toml
#   CONTACT_EMAIL           — Where to send review notifications
#   SITE_DOMAIN             — Site domain for CORS validation

name = "review-form"
main = "review-worker.js"
compatibility_date = "2024-01-01"

# Workers Logs — retain invocation logs so failed submissions can be
# diagnosed after the fact. Free on the Workers free plan.
# View at: https://dash.cloudflare.com/?to=/:account/workers/services/view/review-form/production/observability/logs
[observability]
enabled = true
head_sampling_rate = 1.0
